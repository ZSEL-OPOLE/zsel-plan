# ═══════════════════════════════════════════════════════════════════════════════
# zsel-plan CI/CD — lint + test + build ARM64 → zot → gitops-infra update
# Runs-on: self-hosted zsel-general (ARM64)
# Registry: 10.43.11.137:5000 (zot, internal) — NIE GHCR
# GitOps: ZSEL-OPOLE/gitops-infra (06-apps/manifests/plan/)
# ═══════════════════════════════════════════════════════════════════════════════
name: CI/CD Plan Lekcji

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: zsel-plan-${{ github.ref }}
  cancel-in-progress: true

env:
  ZOT: 10.43.11.137:5000
  IMAGE: zsel/plan-api
  GITOPS_REPO: ZSEL-OPOLE/gitops-infra
  GITOPS_MANIFEST: 06-apps/manifests/plan/plan.yaml

# ---------------------------------------------------------------------------
jobs:

  # ---------------------------------------------------------------------------
  # 1. Lint + format check
  # ---------------------------------------------------------------------------
  lint:
    name: "🔍 Lint"
    runs-on: zsel-general
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps + ruff
        run: pip install ruff -r requirements.txt

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

  # ---------------------------------------------------------------------------
  # 2. Testy jednostkowe + integracyjne (FastAPI TestClient)
  # ---------------------------------------------------------------------------
  test:
    name: "🧪 Tests"
    runs-on: zsel-general
    timeout-minutes: 10
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt pytest pytest-cov httpx

      - name: Pytest — unit + API tests
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=api \
            --cov=solver \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60
        env:
          PYTHONPATH: .

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-plan-${{ github.run_number }}
          path: coverage.xml
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 3. Build ARM64 → zot (tylko na main, nie PR)
  # ---------------------------------------------------------------------------
  build:
    name: "🐳 Build → zot"
    runs-on: zsel-general
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    timeout-minutes: 30
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      sha: ${{ steps.meta.outputs.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Image metadata
        id: meta
        run: |
          SHA="${{ github.sha }}"
          SHORT="${SHA:0:7}"
          DATE=$(date +%Y%m%d)
          TAG="${DATE}-${SHORT}"
          echo "sha=${SHORT}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "🏷️ Tag: ${TAG}"

      # crane — push OCI format do Zot (HTTP insecure, Zot v2 odrzuca Docker manifest v2)
      - name: Install crane
        run: |
          set -eo pipefail
          CRANE_VER=0.20.2
          INSTALL_DIR="${HOME}/.local/bin"
          mkdir -p "${INSTALL_DIR}"
          curl --retry 3 --retry-delay 2 -fsSL \
            "https://github.com/google/go-containerregistry/releases/download/v${CRANE_VER}/go-containerregistry_Linux_arm64.tar.gz" \
            | tar -C "${INSTALL_DIR}" -xz crane
          echo "${INSTALL_DIR}" >> "$GITHUB_PATH"
          "${INSTALL_DIR}/crane" version

      - name: Setup Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.7.0

      # Zot v2 (distSpecVersion 1.1.0) odrzuca Docker manifest v2 (push:true z buildx).
      # Rozwiązanie: OCI tar → tar -xf → OCI dir → crane push (vnd.oci.image.manifest.v1+json)
      - name: Build arm64 (OCI tar)
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: .
          platforms: linux/arm64
          push: false
          outputs: type=oci,dest=/tmp/plan-oci.tar
          tags: ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
          provenance: false
          cache-from: type=local,src=/tmp/.buildx-cache-plan
          cache-to: type=local,dest=/tmp/.buildx-cache-plan-new,mode=max

      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache-plan
          mv /tmp/.buildx-cache-plan-new /tmp/.buildx-cache-plan 2>/dev/null || true

      - name: Push → Zot via crane (OCI format)
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          OCI_DIR="/tmp/plan-oci-layout"
          mkdir -p "${OCI_DIR}"
          tar -xf /tmp/plan-oci.tar -C "${OCI_DIR}"
          test -f "${OCI_DIR}/index.json" || { echo "❌ index.json not found"; exit 1; }
          crane push --insecure "${OCI_DIR}" "${{ env.ZOT }}/${{ env.IMAGE }}:${TAG}"
          crane push --insecure "${OCI_DIR}" "${{ env.ZOT }}/${{ env.IMAGE }}:latest"
          rm -rf /tmp/plan-oci.tar "${OCI_DIR}"
          echo "✅ ${{ env.ZOT }}/${{ env.IMAGE }}:${TAG}"

  # ---------------------------------------------------------------------------
  # 4. GitOps update — gitops-infra/06-apps/manifests/plan/
  # ---------------------------------------------------------------------------
  gitops-update:
    name: "🔄 GitOps update"
    runs-on: zsel-general
    needs: build
    timeout-minutes: 10

    steps:
      - name: Sprawdź GITOPS_PAT
        id: pat
        run: |
          if [ -z "${{ secrets.GITOPS_PAT }}" ]; then
            echo "⚠️ GITOPS_PAT nie jest skonfigurowany — pomijam GitOps update"
            echo "⚠️ Aby włączyć: gh secret set GITOPS_PAT --org ZSEL-OPOLE --visibility all"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout gitops-infra
        if: steps.pat.outputs.skip != 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}

      - name: Update image tag w manifeście
        if: steps.pat.outputs.skip != 'true'
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          FILE="${{ env.GITOPS_MANIFEST }}"

          if [ ! -f "$FILE" ]; then
            echo "❌ $FILE nie istnieje w gitops-infra!"
            echo "   Utwórz manifest i dodaj go do kustomization.yaml przed deployem."
            exit 1
          fi

          sed -i "s|image: .*${{ env.ZOT }}/${{ env.IMAGE }}:.*|image: ${{ env.ZOT }}/${{ env.IMAGE }}:${TAG}|g" "$FILE"
          echo "✅ Zaktualizowano: ${{ env.ZOT }}/${{ env.IMAGE }}:${TAG}"

      - name: Commit & push
        if: steps.pat.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.GITOPS_MANIFEST }}"
          if git diff --cached --quiet; then
            echo "ℹ️ Brak zmian"
          else
            git commit -m "chore(deploy): plan-api → ${{ needs.build.outputs.tag }}"
            git push
            echo "✅ GitOps zaktualizowany — ArgoCD sync w toku"
          fi

      - name: Summary
        run: |
          echo "### 🗓️ Plan Lekcji Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ needs.build.outputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ needs.build.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | \`${{ env.ZOT }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.IMAGE }}\` |" >> $GITHUB_STEP_SUMMARY
