name: Build & Push plan-lekcji

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/zsel-opole/zsel-plan
  GITOPS_REPO: ZSEL-OPOLE/zsel-edu
  GITOPS_MANIFEST: plan/plan.yaml

jobs:
  test:
    runs-on: zsel-general
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install ortools fastapi pydantic pytest httpx
      - name: Smoke test
        run: PYTHONPATH=. python -c "from api.main import app; print('OK:', len(app.routes), 'routes')"

  build:
    needs: test
    runs-on: zsel-general
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          provenance: false

      - name: Make package public
        run: |
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/ZSEL-OPOLE/packages/container/zsel-plan" \
            -d '{"visibility":"public"}' || true

      - name: Update K8s manifest in GitOps
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:$GH_TOKEN@github.com/${{ env.GITOPS_REPO }} gitops
          cd gitops
          NEW_TAG="${{ github.sha }}"
          sed -i "s|image: ghcr.io/zsel-opole/zsel-plan:.*|image: ${{ env.IMAGE }}:${NEW_TAG}|g" \
            ${{ env.GITOPS_MANIFEST }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.GITOPS_MANIFEST }}
          git diff --cached --quiet && echo "Brak zmian" && exit 0
          git commit -m "deploy(plan-lekcji): → ${{ github.sha }}"
          git push
